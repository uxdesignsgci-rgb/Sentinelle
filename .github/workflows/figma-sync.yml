name: Sync Figma Components to GitHub
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-figma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Figma Components
        uses: subhamBharadwazz/figma-asset-downloader@main
        with:
          FIGMA_API_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          OUTPUT_DIR: 'maquettes'
